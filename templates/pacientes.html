<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pacientes</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Vital Saúde - Cadastro de Pacientes</h1>

        <form method="POST">
            <input type="text" name="nome" id="nome" placeholder="Nome do paciente" required>
            <input type="text" name="cpf" id="cpf" placeholder="000.000.000-00" maxlength="14" required>
            <input type="text" name="telefone" id="telefone" placeholder="00-000000000" maxlength="12" required>
            <button type="submit">Cadastrar</button>
        </form>

        <h2>Pacientes cadastrados</h2>

        <ul>
            {% for paciente in pacientes %}
                <li>
                    {{ paciente.nome }} - CPF: {{ paciente.cpf }} - Telefone: {{ paciente.telefone }}
                    <form method="POST" action="/pacientes/deletar/{{ paciente.cpf }}" style="display:inline;">
                        <button type="submit" class="btn-deletar">Deletar</button>
                    </form>
                </li>
            {% endfor %}
        </ul>

        <a href="/">Voltar</a>
    </div>

    <script>
        const nomeInput = document.getElementById("nome");
        nomeInput.addEventListener("input", function () {
            this.value = this.value.replace(/[^a-zA-ZÀ-ÿ\s]/g, "");
        });

        const cpfInput = document.getElementById("cpf");
        cpfInput.addEventListener("input", function () {
            let digits = this.value.replace(/\D/g, "").slice(0, 11);
            if (digits.length <= 3) {
                this.value = digits;
            } else if (digits.length <= 6) {
                this.value = digits.slice(0, 3) + "." + digits.slice(3);
            } else if (digits.length <= 9) {
                this.value = digits.slice(0, 3) + "." + digits.slice(3, 6) + "." + digits.slice(6);
            } else {
                this.value = digits.slice(0, 3) + "." + digits.slice(3, 6) + "." + digits.slice(6, 9) + "-" + digits.slice(9);
            }
        });

        const telefoneInput = document.getElementById("telefone");
        telefoneInput.addEventListener("input", function () {
            let digits = this.value.replace(/\D/g, "").slice(0, 11);
            if (digits.length <= 2) {
                this.value = digits;
            } else {
                this.value = digits.slice(0, 2) + "-" + digits.slice(2);
            }
        });
    </script>
</body>
</html>
