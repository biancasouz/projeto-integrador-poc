<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empresas</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Vital Saúde - Cadastro de Empresas</h1>

        <form method="POST">
            <input type="text" name="nome" id="nome" placeholder="Nome da empresa" required>
            <input type="text" name="cnpj" id="cnpj" placeholder="00.000.000/0000-00" maxlength="18" required>
            <button type="submit">Cadastrar</button>
        </form>

        <h2>Empresas cadastradas</h2>

        <ul>
            {% for empresa in empresas %}
                <li>
                    {{ empresa.nome }} - CNPJ: {{ empresa.cnpj }}
                    <form method="POST" action="/empresas/deletar/{{ empresa.id }}" style="display:inline;">
                        <button type="submit" class="btn-deletar">Deletar</button>
                    </form>
                </li>
            {% endfor %}
        </ul>

        <a href="/">Voltar</a>
    </div>

    <script>
        const nomeInput = document.getElementById("nome");
        nomeInput.addEventListener("input", function () {
            this.value = this.value.replace(/[^a-zA-ZÀ-ÿ\s]/g, "");
        });

        const cnpjInput = document.getElementById("cnpj");
        cnpjInput.addEventListener("input", function () {
            let digits = this.value.replace(/\D/g, "").slice(0, 14);
            if (digits.length <= 2) {
                this.value = digits;
            } else if (digits.length <= 5) {
                this.value = digits.slice(0, 2) + "." + digits.slice(2);
            } else if (digits.length <= 8) {
                this.value = digits.slice(0, 2) + "." + digits.slice(2, 5) + "." + digits.slice(5);
            } else if (digits.length <= 12) {
                this.value = digits.slice(0, 2) + "." + digits.slice(2, 5) + "." + digits.slice(5, 8) + "/" + digits.slice(8);
            } else {
                this.value = digits.slice(0, 2) + "." + digits.slice(2, 5) + "." + digits.slice(5, 8) + "/" + digits.slice(8, 12) + "-" + digits.slice(12);
            }
        });
    </script>
</body>
</html>
